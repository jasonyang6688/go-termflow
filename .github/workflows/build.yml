name: Build Desktop Apps

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Test
        run: go test ./...

      - name: Build Windows app and installer
        run: wails build -nsis

      - name: Package Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item -Path build/bin/TermFlow.exe -Destination dist/TermFlow-windows-amd64.exe
          $installer = Get-ChildItem -Path build/bin -Filter "*installer*.exe" | Select-Object -First 1
          if ($installer) {
            Copy-Item -LiteralPath $installer.FullName -Destination dist/TermFlow-windows-amd64-installer.exe
          }
          Compress-Archive -Path dist/TermFlow-windows-amd64.exe -DestinationPath dist/TermFlow-windows-amd64-portable.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TermFlow-windows-amd64
          path: dist/*
          if-no-files-found: error

  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Test
        run: go test ./...

      - name: Build macOS app
        run: wails build

      - name: Package macOS artifact
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/bin/TermFlow.app dist/TermFlow-macos.zip
          hdiutil create -volname "TermFlow" -srcfolder build/bin/TermFlow.app -ov -format UDZO dist/TermFlow-macos.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: TermFlow-macos
          path: dist/*
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find dist -type f -maxdepth 3 -print -exec cp {} release-files/ \;
          find release-files -type f -maxdepth 1 -print
          test "$(find release-files -type f -maxdepth 1 | wc -l)" -gt 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-files/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-files/* \
              --title "TermFlow ${GITHUB_REF_NAME}" \
              --notes "Desktop builds for Windows and macOS."
          fi
