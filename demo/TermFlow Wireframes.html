<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>TermFlow — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kalam:wght@300;400;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #E8E4DA; font-family: 'Kalam', cursive; color: #2B2A28; }
  * { box-sizing: border-box; }
  /* sketchy scroll hint for artboard interior */
  .dc-card { background: #FAF8F4 !important; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wireframe-shared.jsx"></script>
<script type="text/babel" src="wireframes-main.jsx"></script>
<script type="text/babel" src="wireframes-modules.jsx"></script>

<script type="text/babel">
const DEFAULTS = /*EDITMODE-BEGIN*/{
  "showAnnotations": true,
  "platform": "mac",
  "density": "comfy",
  "paperTone": "warm"
}/*EDITMODE-END*/;

function App() {
  const [state, setKey] = useTweaks(DEFAULTS);

  // apply paper tone to body
  React.useEffect(() => {
    const toneMap = { warm: '#E8E4DA', cool: '#E4E6EA', neutral: '#E6E5E1' };
    document.body.style.background = toneMap[state.paperTone] || toneMap.warm;

    // toggle annotations via CSS
    if (!state.showAnnotations) {
      let s = document.getElementById('hide-annos');
      if (!s) { s = document.createElement('style'); s.id = 'hide-annos'; document.head.appendChild(s); }
      s.textContent = '[data-anno]{display:none!important}';
    } else {
      const s = document.getElementById('hide-annos');
      if (s) s.remove();
    }
  }, [state.showAnnotations, state.paperTone]);

  return (
    <>
      <DesignCanvas>
        {/* Header / intro artboard */}
        <DCSection id="intro" title="TermFlow · Wireframes" subtitle="PRD v1.0 线框探索 — 粗略笔触，重在结构与流程">
          <DCArtboard id="cover" label="Project context" width={720} height={420}>
            <div style={{ padding: 36, fontFamily: "'Kalam', cursive", color: '#2B2A28', background: '#FAF8F4', height: '100%' }}>
              <div style={{ fontFamily: "'Caveat', cursive", fontSize: 56, fontWeight: 700, lineHeight: 1 }}>TermFlow</div>
              <div style={{ fontSize: 18, color: '#6B6864', marginTop: 4, fontFamily: "'Kalam', cursive" }}>像呼吸一样自然的服务器操控体验</div>
              <div style={{ marginTop: 26, fontSize: 16, lineHeight: 1.7 }}>
                <div><b>目标</b> · SSH 终端工具 · macOS + Windows</div>
                <div><b>核心创新</b> · 智能保活 / 断点续传 / 快捷命令标签</div>
                <div><b>视觉方向</b> · Notion / Linear 的克制 · macOS 原生感</div>
              </div>
              <div style={{ marginTop: 22, fontSize: 15, color: '#6B6864' }}>
                下面每一节包含 3–5 个方向的粗略线框。左侧为主窗口整体，后续为具体模块。<br/>
                打开右上角 <b>Tweaks</b> 可切换 Mac / Win 外壳、隐藏注释、切换纸张色调。
              </div>
              <div style={{ marginTop: 30, display: 'flex', gap: 10, fontFamily: "'Caveat', cursive", fontSize: 18 }}>
                <span style={{ padding: '4px 12px', border: '1.3px solid #2B2A28', borderRadius: 14 }}>1 · Main window</span>
                <span style={{ padding: '4px 12px', border: '1.3px solid #2B2A28', borderRadius: 14 }}>2 · SFTP</span>
                <span style={{ padding: '4px 12px', border: '1.3px solid #2B2A28', borderRadius: 14 }}>3 · Monitor</span>
                <span style={{ padding: '4px 12px', border: '1.3px solid #2B2A28', borderRadius: 14 }}>4 · Connect</span>
                <span style={{ padding: '4px 12px', border: '1.3px solid #2B2A28', borderRadius: 14 }}>5 · Commands</span>
                <span style={{ padding: '4px 12px', border: '1.3px solid #2B2A28', borderRadius: 14 }}>6 · Empty</span>
              </div>
            </div>
          </DCArtboard>
        </DCSection>

        {/* 1 · Main window layouts */}
        <DCSection id="main" title="1 · Main window layouts" subtitle="4 方向 — 从经典 IDE 到命令调色板">
          <DCArtboard id="m1" label="A · Classic IDE — rail + list + terminal + pills (PRD 原型)" width={1200} height={760}>
            <MainV1_ClassicIDE platform={state.platform} />
          </DCArtboard>
          <DCArtboard id="m2" label="B · Split — terminal ∥ SFTP 同屏" width={1200} height={760}>
            <MainV2_SplitSFTP platform={state.platform} />
          </DCArtboard>
          <DCArtboard id="m3" label="C · Palette-centric — ⌘P drives everything" width={1200} height={760}>
            <MainV3_Palette platform={state.platform} />
          </DCArtboard>
          <DCArtboard id="m4" label="D · Canvas — stacked sessions + live monitor rail" width={1200} height={760}>
            <MainV4_Canvas platform={state.platform} />
          </DCArtboard>
        </DCSection>

        {/* 2 · SFTP */}
        <DCSection id="sftp" title="2 · SFTP file management" subtitle="双面板 / 抽屉 / fan-out · 都支持断点续传">
          <DCArtboard id="sftp1" label="A · Classic dual-pane + transfer queue" width={900} height={560}><SFTPv1/></DCArtboard>
          <DCArtboard id="sftp2" label="B · Slide-in drawer on terminal" width={900} height={560}><SFTPv2/></DCArtboard>
          <DCArtboard id="sftp3" label="C · Quick drop tray · fan-out to N servers" width={900} height={560}><SFTPv3/></DCArtboard>
        </DCSection>

        {/* 3 · Monitor */}
        <DCSection id="monitor" title="3 · Resource monitor" subtitle="full dashboard / ambient strip / fleet grid">
          <DCArtboard id="mon1" label="A · Full dashboard · per-server" width={900} height={560}><MonitorV1/></DCArtboard>
          <DCArtboard id="mon2" label="B · Ambient strip · above terminal · zero-click" width={900} height={560}><MonitorV2/></DCArtboard>
          <DCArtboard id="mon3" label="C · Fleet grid · at-a-glance across 12 servers" width={900} height={560}><MonitorV3/></DCArtboard>
        </DCSection>

        {/* 4 · Connection dialog */}
        <DCSection id="conn" title="4 · New / manage connection" subtitle="表单 / 粘贴向导 / 列表编辑三种思路">
          <DCArtboard id="c1" label="A · Modal form + auto-parse paste bar" width={640} height={560}><ConnDialogV1/></DCArtboard>
          <DCArtboard id="c2" label="B · Wizard — paste only, detect the rest" width={640} height={560}><ConnDialogV2/></DCArtboard>
          <DCArtboard id="c3" label="C · List + inline detail edit" width={640} height={560}><ConnDialogV3/></DCArtboard>
        </DCSection>

        {/* 5 · Quick commands */}
        <DCSection id="quick" title="5 · Quick commands" subtitle="grid 管理器 / chip 编辑器 / flow 串联">
          <DCArtboard id="q1" label="A · Grid · scope sidebar + cards" width={760} height={560}><QuickCmdV1/></DCArtboard>
          <DCArtboard id="q2" label="B · Chip editor · live preview" width={760} height={560}><QuickCmdV2/></DCArtboard>
          <DCArtboard id="q3" label="C · Flow builder · chain with human-in-loop" width={760} height={560}><QuickCmdV3/></DCArtboard>
        </DCSection>

        {/* 6 · Empty / state */}
        <DCSection id="empty" title="6 · Empty & transitional states" subtitle="首次启动 / 欢迎 / 自动重连">
          <DCArtboard id="e1" label="A · Hero splash + feature trio" width={900} height={560}><EmptyV1/></DCArtboard>
          <DCArtboard id="e2" label="B · Split onboarding — paste-first" width={900} height={560}><EmptyV2/></DCArtboard>
          <DCArtboard id="e3" label="C · Reconnecting overlay — session preserved" width={900} height={560}><EmptyV3/></DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Display">
          <TweakToggle label="Show annotations" value={state.showAnnotations} onChange={v => setKey('showAnnotations', v)} />
          <TweakRadio label="Window chrome"
            options={[{label:'macOS',value:'mac'},{label:'Windows',value:'win'}]}
            value={state.platform} onChange={v => setKey('platform', v)} />
          <TweakRadio label="Paper tone"
            options={[{label:'Warm',value:'warm'},{label:'Cool',value:'cool'},{label:'Neutral',value:'neutral'}]}
            value={state.paperTone} onChange={v => setKey('paperTone', v)} />
        </TweakSection>
        <TweakSection title="Tips">
          <div style={{ fontSize: 12, color: '#666', lineHeight: 1.5, padding: '4px 2px' }}>
            · pan: drag empty canvas<br/>
            · zoom: ⌘/Ctrl + scroll<br/>
            · focus any board: hover → ⤢ icon<br/>
            · drag grip to reorder<br/>
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// Annotation wrapper — tag all annos so we can hide them
const _Anno = window.WFAnnotation;
window.WFAnnotation = function(props) {
  return <div data-anno style={{ position:'absolute', left: props.x, top: props.y, zIndex: 5 }}>
    <_Anno {...props} x={0} y={0} />
  </div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
